<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online Desktop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="scripts.js"></script>
</head>
<body onload="startTime()">
    <div class="container">
        <div class="top">
            <div id="date">Date</div>
            <h1>My Personal Desktop</h1>
            <div id="clock"></div>
        </div>
        <div class="main">
           <div class="widget">
                <h2>Widget 1</h2>
                <div class="notepad">
                    <textarea id="note-area" name="message" rows="20" cols="40">

                    </textarea>
                </div>
                <p><button id="saveNoteBtn">Save</button></p>
            </div>
            <div class="widget">
                <h2>Widget 2</h2>
                <iframe width="95%" height="300vh" frameborder="2" src="https://www.youtube.com/embed/JOmILMSWlLs?si=DIeu_vugbMFRNbFd" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
             <div class="widget">
                <h2>Widget 3</h2>
            </div>
        </div>
    </div>
</body>

<script>
    try {
  var loadNotes = localStorage.getItem("notes");
}
catch(err) {
  var loadNotes = "Enter your notes here and click 'Save'";
}

$("#note-area").val(loadNotes);

var today = new Date();
var dd = today.getDate();
var mm = today.getMonth()+1; //January is 0!
var yyyy = today.getFullYear();
if(dd<10) {
    dd = '0'+dd
}
if(mm<10) {
    mm = '0'+mm
}
var sp = '/';
$('#date').html(mm+sp+dd+sp+yyyy);

$("#saveNoteBtn").click(function(){
    var currentNotes = $("#note-area").val();
    localStorage.setItem("notes", currentNotes);    
});

</script>
</html>
